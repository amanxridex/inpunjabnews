            localStorage.setItem('theme', 'light');
            if(btn) btn.innerHTML = '☀️';
        } else {
            html.setAttribute('data-theme', 'dark');
            localStorage.setItem('theme', 'dark');
            if(btn) btn.innerHTML = '🌙';
        }
    }

    // Get current date in IST
    const getISTDateString = () => {
        const now = new Date();
        const istOffset = 5.5 * 60 * 60 * 1000;
        const istTime = new Date(now.getTime() + now.getTimezoneOffset() * 60000 + istOffset);
        
        const year = istTime.getFullYear();
        const month = String(istTime.getMonth() + 1).padStart(2, '0');
        const day = String(istTime.getDate()).padStart(2, '0');
        
        return `${year}-${month}-${day}`;
    };

    const renderPanchaang = (dateStr) => {
        if (panchaangData[dateStr]) {
            let rawText = panchaangData[dateStr];
            
            // Format *bold* text
            let formattedText = rawText.replace(/\*(.*?)\*/g, '<strong>$1</strong>');
            
            // Split into lines
            let lines = formattedText.split('\n').filter(line => line.trim() !== '');
            let finalHtml = '';
            
            let inVichar = false;
            
            lines.forEach((line, index) => {
                let delay = index * 0.1;
                
                if (line.includes('<strong>आज का विचार</strong>') || line.includes('<strong>आज का विचार</strong>')) {
                    finalHtml += `<div class="spiritual-divider" style="animation-delay: ${delay}s"></div>`;
                    finalHtml += `<div class="vichar-box panchaang-line" style="animation-delay: ${delay + 0.1}s">`;
                    inVichar = true;
                    // Remove the 'आज का विचार -' part and just keep the quote
                    line = line.replace(/<strong>आज का विचार<\/strong>\s*-\s*/, '<strong>✨ आज का विचार ✨</strong><br><br>');
                }
                
                if (!inVichar) {
                    finalHtml += `<div class="panchaang-line" style="animation-delay: ${delay}s">${line}</div>`;
                } else {
                    finalHtml += `<div style="margin-bottom: 10px;">${line}</div>`;
                }
            });
            
            if (inVichar) {
                finalHtml += `</div>`; // close vichar-box
            }
            
            displayArea.innerHTML = finalHtml;
        } else {
            displayArea.innerHTML = `<div class="panchaang-line" style="text-align: center; color: var(--text-muted, #888);">
                <p>No panchaang data available for <strong>${dateStr}</strong>.</p>
                <p>Please check back later or select another date.</p>
            </div>`;
        }
    };

    renderPanchaang(dateInput.value);

    dateInput.addEventListener('change', (e) => {
        const selectedDate = e.target.value;
        if (selectedDate > todayStr) {
            alert("Future dates are not allowed. Reverting to today.");
            e.target.value = todayStr;
            renderPanchaang(todayStr);
        } else {
            renderPanchaang(selectedDate);
        }
    });

    function updateClock() {
        const now = new Date();
        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        const dateString = now.toLocaleDateString('en-US', options);
        const clockDisplay = document.getElementById('datetime-display');
        if(clockDisplay) clockDisplay.innerText = '📅 ' + dateString;
    }
    updateClock();
    setInterval(updateClock, 60000);
</script>
